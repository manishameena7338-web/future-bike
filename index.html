<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ninja H2R Ultimate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 3D Model Viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial, sans-serif;
      color:white;
      background:black;
    }

    #bgVideo {
      position:fixed;
      right:0;
      bottom:0;
      min-width:100%;
      min-height:100%;
      z-index:-1;
      object-fit:cover;
      filter:brightness(35%);
    }

    nav {
      display:flex;
      justify-content:space-between;
      padding:15px 25px;
      background:rgba(0,0,0,0.6);
      border-bottom:1px solid #00ffcc;
    }

    nav h1 {
      color:#00ffcc;
    }

    .hero {
      text-align:center;
      padding:40px 20px;
    }

    button {
      padding:12px 25px;
      background:#00ffcc;
      border:none;
      cursor:pointer;
    }

    model-viewer {
      width:100%;
      height:420px;
    }

    #speed {
      position:fixed;
      bottom:20px;
      left:20px;
      font-size:28px;
      color:#00ffcc;
    }

    .fire {
      position:fixed;
      bottom:120px;
      left:50%;
      width:25px;
      height:70px;
      background:linear-gradient(red, orange, yellow);
      animation: flame 0.15s infinite alternate;
      transform:translateX(-50%);
    }

    @keyframes flame {
      from { transform:translateX(-50%) scaleY(1); }
      to { transform:translateX(-50%) scaleY(1.6); }
    }
  </style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="https://cdn.coverr.co/videos/coverr-motorbike-racing-1600/1080p.mp4" type="video/mp4">
</video>

<!-- SOUND -->
<audio id="engineSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b9c06.mp3" loop></audio>

<nav>
  <h1>H2R🔥</h1>
</nav>

<section class="hero">
  <h2>Kawasaki Ninja H2R</h2>
  <button onclick="toggleSound()">Start / Stop Engine 🔊</button>
</section>

<!-- 3D MODEL -->
<model-viewer 
  src="bike.glb"
  auto-rotate 
  camera-controls>
</model-viewer>

<div class="fire"></div>
<div id="speed">0 km/h</div>

<script>
let speed = 0;
let sound = document.getElementById("engineSound");

setInterval(()=>{
  if(speed < 400){
    speed += Math.random()*8;
    document.getElementById("speed").innerText = Math.floor(speed) + " km/h";
  }
},200);

function toggleSound(){
  if(sound.paused){
    sound.play();
  } else {
    sound.pause();
  }
}
</script>

</body>
</html>
