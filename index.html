<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ninja H2R REAL HD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:#00ffcc;
  z-index:10;
}

button {
  padding:10px 20px;
  background:#00ffcc;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
  <h2>🏍️ Ninja H2R REAL HD</h2>
  <button id="startBtn">Start Engine 🔊</button>
</div>

<audio id="sound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b9c06.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/RGBELoader.js"></script>

<script>
// SCENE
let scene = new THREE.Scene();

// CAMERA
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,2,6);

// RENDERER (HD QUALITY)
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

// HDR ENVIRONMENT (REAL LIGHT)
new THREE.RGBELoader()
  .load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_03_1k.hdr', function(texture){
    texture.mapping = THREE.EquirectangularReflectionMapping;
    scene.environment = texture;
    scene.background = texture;
  });

// LIGHT
let light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,7);
scene.add(light);

// GROUND
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// CONTROLS
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LOAD BIKE
let loader = new THREE.GLTFLoader();
let bike;

loader.load('./bike.glb', function(gltf){
  bike = gltf.scene;
  bike.scale.set(1.5,1.5,1.5);
  scene.add(bike);
});

// SOUND FIX (REAL WORKING)
let sound = document.getElementById("sound");
document.getElementById("startBtn").addEventListener("click", ()=>{
  sound.currentTime = 0;
  sound.play().catch(err => console.log(err));
});

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  if(bike){
    bike.rotation.y += 0.002;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
