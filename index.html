<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ninja H2R Ultra</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background:black;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(270deg,#000,#002222,#004444,#000);
  background-size:800% 800%;
  z-index:-2;
}

/* NAV */
nav {
  padding:15px;
  text-align:center;
  color:#00ffcc;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px;
}

/* 3D MODEL FIXED */
model-viewer {
  position:fixed;
  top:120px;
  width:100%;
  height:400px;
}

/* SECTIONS */
.section {
  height:100vh;
  padding:50px;
  background:rgba(0,0,0,0.6);
  margin-top:400px;
}

/* SPEED */
#speed {
  position:fixed;
  bottom:20px;
  left:20px;
  font-size:28px;
  color:#00ffcc;
}

/* FIRE */
.fire {
  position:fixed;
  bottom:150px;
  left:60%;
  width:20px;
  height:60px;
  background:linear-gradient(red, orange, yellow);
  animation: flame 0.2s infinite alternate;
}

@keyframes flame {
  from { transform: scaleY(1); }
  to { transform: scaleY(1.5); }
}
</style>
</head>

<body onclick="startSoundOnce()">

<div class="bg" id="bg"></div>

<audio id="engineSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b9c06.mp3" loop></audio>

<nav>🏍️ Ninja H2R ULTRA</nav>

<div class="hero">
  <h2>Kawasaki Ninja H2R</h2>
  <button onclick="toggleSound()">Start Engine 🔊</button>
</div>

<model-viewer 
  id="bike"
  src="./bike.glb"
  auto-rotate
  camera-controls
  exposure="1.5">
</model-viewer>

<div class="fire"></div>
<div id="speed">0 km/h</div>

<div class="section">
  <h2>Specifications</h2>
  <p>Engine: 998cc Supercharged</p>
  <p>Power: 310 HP</p>
</div>

<div class="section">
  <h2>Performance</h2>
  <p>Top Speed: 400 km/h</p>
</div>

<div class="section">
  <h2>About</h2>
  <p>Track-only hyperbike built for extreme speed.</p>
</div>

<script>
let speed = 0;
let sound = document.getElementById("engineSound");
let bike = document.getElementById("bike");
let started = false;

/* SPEED */
setInterval(()=>{
  if(speed < 400){
    speed += Math.random()*5;
    document.getElementById("speed").innerText = Math.floor(speed) + " km/h";
  }
},200);

/* SOUND */
function toggleSound(){
  sound.muted = false;
  sound.play();
}

function startSoundOnce(){
  if(!started){
    sound.play().catch(()=>{});
    started = true;
  }
}

/* SCROLL ANIMATION */
window.addEventListener("scroll", ()=>{
  let scroll = window.scrollY;

  // background move
  document.getElementById("bg").style.backgroundPosition = scroll + "px";

  // rotate bike
  bike.style.transform = "rotateY(" + scroll/2 + "deg) scale(" + (1 + scroll/2000) + ")";
});
</script>

</body>
</html>
